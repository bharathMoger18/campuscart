<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Password Reset — CampusCart</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <main class="auth-container">
      <div class="auth-wrapper">
        <div class="auth-card">
          <div class="auth-hero">
            <h1>Reset password</h1>
            <p>Enter your email — we'll send a password reset link.</p>
          </div>

          <form id="passwordResetForm" class="auth-grid">
            <div class="form-group">
              <label for="email">Email</label>
              <input id="email" type="email" required />
            </div>

            <button
              id="passwordResetBtn"
              class="btn btn-primary primary-cta"
              type="submit"
            >
              Send Reset Link
            </button>
          </form>

          <p class="form-footer"><a href="/login.html">Back to login</a></p>
        </div>
      </div>
    </main>

    <script type="module" src="js/auth/password_reset.js"></script>
  </body>
</html>
