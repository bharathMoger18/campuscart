<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Set New Password — CampusCart</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <main class="auth-container">
      <div class="auth-wrapper">
        <div class="auth-card">
          <div class="auth-hero">
            <h1>Set new password</h1>
            <p>Enter a new password to finish resetting your account.</p>
          </div>

          <form id="passwordResetConfirmForm" class="auth-grid">
            <div class="form-group">
              <label for="password">New Password</label>
              <input id="password" type="password" required />
            </div>

            <div class="form-group">
              <label for="password2">Confirm Password</label>
              <input id="password2" type="password" required />
            </div>

            <button
              id="passwordResetConfirmBtn"
              class="btn btn-primary primary-cta"
              type="submit"
            >
              Set New Password
            </button>
          </form>

          <p class="form-footer"><a href="/login.html">Back to login</a></p>
        </div>
      </div>
    </main>

    <script type="module" src="js/auth/password_reset_confirm.js"></script>
  </body>
</html>
