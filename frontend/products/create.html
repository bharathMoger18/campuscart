<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create or Edit Product</title>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./../css/components.css" />
    <!-- <link rel="stylesheet" href="css/components.css" /> -->
    <!-- <link rel="stylesheet" href="css/auth.css" /> -->
  </head>
  <body
    class="bg-gray-100 min-h-screen flex flex-col items-center justify-center"
  >
    <div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-lg">
      <h2
        id="page-title"
        class="text-2xl font-bold mb-6 text-center text-gray-700"
      >
        Add New Product
      </h2>

      <form id="product-form" class="space-y-4">
        <div>
          <label class="block text-gray-700 font-semibold">Title</label>
          <input
            type="text"
            id="title"
            name="title"
            class="w-full border border-gray-300 rounded p-2"
            required
          />
        </div>

        <div>
          <label class="block text-gray-700 font-semibold">Description</label>
          <textarea
            id="description"
            name="description"
            class="w-full border border-gray-300 rounded p-2"
            required
          ></textarea>
        </div>

        <div>
          <label class="block text-gray-700 font-semibold">Category</label>
          <select
            id="category"
            name="category"
            class="w-full border border-gray-300 rounded p-2"
            required
          >
            <option value="">-- Select Category --</option>
            <option value="Books">Books</option>
            <option value="Electronics">Electronics</option>
            <option value="Clothing">Clothing</option>
            <option value="Accessories">Accessories</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div>
          <label class="block text-gray-700 font-semibold">Price (₹)</label>
          <input
            type="number"
            id="price"
            name="price"
            class="w-full border border-gray-300 rounded p-2"
            required
          />
        </div>

        <div>
          <label class="block text-gray-700 font-semibold">Available?</label>
          <select
            id="is_available"
            name="is_available"
            class="w-full border border-gray-300 rounded p-2"
          >
            <option value="true">Yes</option>
            <option value="false">No</option>
          </select>
        </div>

        <div>
          <label class="block text-gray-700 font-semibold">Image</label>
          <input
            type="file"
            id="image"
            name="image"
            accept="image/*"
            class="w-full border border-gray-300 rounded p-2"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded transition"
        >
          Save Product
        </button>
      </form>
    </div>

    <script type="module">
      import { api } from '../js/core/api.js';
      import { showAlert, redirectTo } from '../js/core/utils.js';

      const params = new URLSearchParams(window.location.search);
      const editId = params.get('id');
      const form = document.getElementById('product-form');
      const pageTitle = document.getElementById('page-title');

      if (editId) {
        pageTitle.textContent = 'Edit Product';
        loadProduct();
      }

      async function loadProduct() {
        try {
          const product = await api.get(`/products/${editId}/`);
          document.getElementById('title').value = product.title || '';
          document.getElementById('description').value =
            product.description || '';
          document.getElementById('category').value = product.category || '';
          document.getElementById('price').value = product.price || '';
          document.getElementById('is_available').value = String(
            product.is_available
          );
        } catch (err) {
          console.error(err);
          showAlert('❌ Failed to load product details', 'error');
        }
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = new FormData(form);
        const image = document.getElementById('image').files[0];
        if (image) formData.append('image', image);

        try {
          if (editId) {
            await api.patch(`/products/${editId}/`, formData);
            showAlert('✅ Product updated successfully', 'success');
          } else {
            await api.post('/products/', formData);
            showAlert('✅ Product created successfully', 'success');
          }
          redirectTo('/seller/products.html', 1000);
        } catch (err) {
          console.error(err);
          const msg = err.data?.detail || '❌ Failed to save product';
          showAlert(msg, 'error');
        }
      });
    </script>
  </body>
</html>
